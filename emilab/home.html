<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>えみラボ体操教室 ホーム</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./emilab_icon.png" />
    <link rel="apple-touch-icon" href="./emilab_icon.png" />
    <meta name="theme-color" content="#fff3f7" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="home-page home-page-sequenced">
    <main class="home-shell" aria-label="えみラボ体操教室 ホーム">
      <header class="home-header">
        <p class="home-kicker">えみラボ体操教室</p>
        <h1>今日も先生と一緒に</h1>
      </header>

      <section class="teacher-photo-card fade-step fade-step-1" aria-label="先生の写真">
        <img src="./teacher-home.jpg" alt="笑顔で両手を広げて迎えている先生" />
      </section>

      <section class="welcome-section fade-step fade-step-2" aria-live="polite">
        <p class="greeting-text" id="greetingText">こんにちは😊</p>
      </section>

      <section class="teacher-message teacher-message-awaiting" aria-labelledby="teacherMessageTitle">
        <p class="section-label" id="teacherMessageTitle">先生からのメッセージ</p>
        <p class="message-text" id="teacherMessageText"></p>
      </section>

      <section class="menu-section fade-step fade-step-4" aria-labelledby="menuTitle">
        <h2 id="menuTitle">メニュー</h2>
        <div class="menu-grid home-menu-grid" id="homeMenu"></div>
      </section>

      <section class="menu-section" id="contentView" aria-labelledby="contentTitle" hidden>
        <a class="forgot-link" href="./home.html" id="homeBackLink">ホームへ戻る</a>
        <h2 id="contentTitle">メニュー</h2>
        <div class="menu-grid" id="contentList"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="下部ナビゲーション">
      <a class="bottom-nav-item is-active" href="./home.html" data-route="home" aria-current="page">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span>ホーム</span>
      </a>
      <a class="bottom-nav-item" href="#lesson-videos" data-route="lesson-videos">
        <span class="nav-icon" aria-hidden="true">🎥</span>
        <span>動画</span>
      </a>
      <a class="bottom-nav-item" href="#voice-lessons" data-route="voice-lessons">
        <span class="nav-icon" aria-hidden="true">🎤</span>
        <span>ボイス</span>
      </a>
      <a class="bottom-nav-item" href="#schedule" data-route="schedule">
        <span class="nav-icon" aria-hidden="true">📅</span>
        <span>スケジュール</span>
      </a>
      <a class="bottom-nav-item" href="#mypage" data-route="mypage">
        <span class="nav-icon" aria-hidden="true">👤</span>
        <span>マイページ</span>
      </a>
    </nav>

    <script src="./js/app.js"></script>
  </body>
</html>
