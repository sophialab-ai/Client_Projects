<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>えみラボ体操教室 ログイン</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./emilab_icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="theme-color" content="#fff3f7" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-screen" aria-label="えみラボ体操教室 入口">
      <video class="background-video" autoplay muted loop playsinline preload="auto">
        <source src="./login-video.mp4" type="video/mp4" />
      </video>

      <div class="video-overlay" aria-hidden="true"></div>

      <header class="brand-header">
        <h1>えみラボ体操教室</h1>
      </header>

      <section class="login-panel">
        <form class="login-form" id="loginForm" novalidate>
          <label class="field">
            <span>ID</span>
            <input
              id="studentId"
              name="studentId"
              type="text"
              inputmode="text"
              autocomplete="username"
              placeholder="例：はなこ001"
              required
            />
          </label>

          <label class="field">
            <span>パスワード</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="パスワードを入力"
              required
            />
          </label>

          <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>

          <button class="login-button" type="submit">ログイン</button>

          <a class="forgot-link" href="#" aria-label="パスワードをお忘れの方はこちら">
            パスワードをお忘れの方はこちら
          </a>
          <p class="password-help-message" id="passwordHelpMessage" role="status" aria-live="polite" hidden>
            パスワードをお忘れの方は、先生にご連絡ください。<br />
            パスワードをご案内いたします。
          </p>
        </form>

        <!-- 開発用デモ導線: 本番公開時はこのブロックを削除してください。 -->
        <button class="demo-button" id="demoButton" type="button">デモを見る</button>
      </section>
    </main>

    <script>
      window.EMI_LABO_GAS_URL = "https://script.google.com/macros/s/AKfycbzluMNSk-kebmgiggou4-XuLKzDc7yCIQjJIyx9xamVO3OSMQnT_2DJQQ2E0H2lClmo4w/exec";
    </script>
    <script src="./app.js"></script>
  </body>
</html>
