<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売り込まずに伝わる冒険 - 冒険の旅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght=500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      background-color: #f7f3e9;
      font-family: 'Zen Maru Gothic', sans-serif;
    }
    /* 冒険ファンタジー風の3D風ボタンシャドウ */
    .btn-adventure {
      box-shadow: 0 6px 0 #4a2c11;
      transition: all 0.1s ease;
    }
    .btn-adventure:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #4a2c11;
    }
    /* ファンタジー風グラデーション背景 */
    .bg-fantasy {
      background: linear-gradient(135deg, #fffcf0 0%, #fbf3db 100%);
    }
    /* 進行状況バーのグラデーション */
    .progress-gradient {
      background: linear-gradient(90deg, #e0a96d 0%, #d48c46 100%);
    }
    /* スムーズなフェードイン */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 動画背景フェードアウトアニメーション用 */
    .video-overlay-active {
      transition: all 1s ease-in-out;
    }
    /* 動画要素のデフォルトコントローラー非表示化とインライン再生の強化 */
    video::-webkit-media-controls {
      display: none !important;
    }
    video {
      pointer-events: none; /* ユーザーのタップによる標準コントロール表示を阻止 */
    }
  </style>
</head>
<body class="text-stone-800 antialiased font-medium">

      </div>

    </header>

          </video>
          <button onclick="skipVideo(1)" class="absolute bottom-4 right-4 bg-black/60 text-white text-xs px-2.5 py-1.5 rounded-md hover:bg-black/80 font-bold transition z-30">

      </section>

    </main>

    <footer class="p-3 text-center text-[10px] text-stone-400 font-bold border-t border-stone-100 bg-stone-50 z-10">

    </footer>
  </div>

                { text: "専門性", value: "D" }

            {
              question: "質問③：あなたに合う表現方法は？",

            }

        },
        // ③ 信頼の吊り橋
        bridge: {

          desc: "風に揺れる長い吊り橋。一歩ずつ,信頼を築きながら渡りきる必要があります。",
          steps: [
            {
              question: "質問①：あなたが今の仕事を始めたきっかけは？",

            },
            {

        // ⑤ 紹介の迷宮
        maze: {
          title: "🧭 紹介 of 迷宮",

      // ⑧・⑨ステージに配置するリンクボタンの遷移先URL設定

        // ⑧ 映像書庫用

        createMovie: "https://docs.google.com/forms/d/e/1FAIpQLSf5wYHc3U-NIm8v73kkv-vThrmmTDVvOAZLNV-95EOJ06BK9Q/viewform"          // ムービー制作URL

    /* ==========================================================================
       ロジック制御エリア
       ========================================================================== */
    
    // ユーザーの回答を記録する配列
    const userAnswers = {
      mori: [null, null, null],
      bridge: [null, null, null],
      cave: [null, null, null],
      maze: [null, null, null]
    };

    // 現在のステージ番号 (1〜9)
    let currentStageNum = 1;

    // 現在の質問インデックス (0〜2)
    let currentQuestionIdx = 0;

    // 起動時に初期セットアップを実行
    window.onload = function() {
      setupAssets();
      showStage(1);
    };

    // 設定データから画像や動画リンク、各ボタンにURLをバインド
    function setupAssets() {
      // ロゴ画像
      if(APP_CONFIG.images.logo) {
        document.getElementById('app-logo').src = APP_CONFIG.images.logo;
      }
      
      // 各動画ソース
      document.getElementById('video-1').src = APP_CONFIG.videos.opening;
      document.getElementById('video-6').src = APP_CONFIG.videos.treasure;
      document.getElementById('video-7').src = APP_CONFIG.videos.gem;

      // ⑧ 映像書庫用の画像とリンク
      document.getElementById('image-library').src = APP_CONFIG.images.library;
      document.getElementById('link-voice').href = APP_CONFIG.links.customerVoice;
      document.getElementById('link-philosophy').href = APP_CONFIG.links.satoeriPhilosophy;
      document.getElementById('link-cases').href = APP_CONFIG.links.caseStudies;
      document.getElementById('link-collection').href = APP_CONFIG.links.caseCollection;

      // ⑨ 最後の選択用の画像とリンク
      document.getElementById('image-future').src = APP_CONFIG.images.future;
      document.getElementById('link-character').href = APP_CONFIG.links.createCharacter;
      document.getElementById('link-movie').href = APP_CONFIG.links.createMovie;

      // HTML5 videoのended(再生終了)イベントを設定
      setupVideoListeners();
    }

    // 動画終了を検知して自動で次のアクション、または次のステージに進める処理
    function setupVideoListeners() {
      // ① オープニング動画が終了したら自動でステージ2へ
      document.getElementById('video-1').addEventListener('ended', function() {
        nextStage();
      });

      // 質問ステージの動画が終了したら質問を出現させる
      document.getElementById('question-video').addEventListener('ended', function() {
        showQuestionInteraction();
      });

      // ⑥ 魅力の宝箱動画が終了したら「次へ進む」ボタン表示
      document.getElementById('video-6').addEventListener('ended', function() {
        document.getElementById('next-action-6').classList.remove('hidden');
      });

      // ⑦ 魅力の秘宝動画が終了したら「次へ進む」ボタン表示
      document.getElementById('video-7').addEventListener('ended', function() {
        document.getElementById('next-action-7').classList.remove('hidden');
      });
    }

    // デバッグ・動作テスト用に動画再生を強制スキップさせる補助メソッド
    function skipVideo(stageId) {
      if (stageId === 1) {
        document.getElementById('video-1').pause();
        nextStage();
      } else if (stageId === 'question') {
        document.getElementById('question-video').pause();
        showQuestionInteraction();
      } else if (stageId === 6) {
        document.getElementById('video-6').pause();
        document.getElementById('next-action-6').classList.remove('hidden');
      } else if (stageId === 7) {
        document.getElementById('video-7').pause();
        document.getElementById('next-action-7').classList.remove('hidden');
      }
    }

    // 各ステージで、3つの質問を段階的にレンダーするための関数
    function renderQuestionStep(qKey) {
      const qData = APP_CONFIG.questions[qKey];
      const stepData = qData.steps[currentQuestionIdx];

      // 質問番号表示
      document.getElementById('question-step-indicator').textContent = `質問 ${currentQuestionIdx + 1} / 3`;
      // 質問テキスト設定
      document.getElementById('question-text').textContent = stepData.question;

      // 選択肢ボタンの動的生成
      const optContainer = document.getElementById('option-buttons');
      optContainer.innerHTML = ''; // クリア

      stepData.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left bg-white hover:bg-amber-50 active:bg-amber-100 text-[#5d4037] p-2.5 rounded-xl border-2 border-stone-300 font-bold shadow-sm transition hover:border-[#5d4037] text-sm";
        btn.innerHTML = `<span class="inline-block bg-[#5d4037] text-white rounded-full w-5.5 h-5.5 text-center text-xs leading-5.5 mr-2 font-black">${opt.value}</span>${opt.text}`;
        btn.onclick = function() {
          // 回答の記録
          userAnswers[qKey][currentQuestionIdx] = opt.value;
          
          // 3問中、次の質問がある場合は進め、ない場合は次のステージへ
          if (currentQuestionIdx < 2) {
            currentQuestionIdx++;
            renderQuestionStep(qKey);
          } else {
            nextStage();
          }
        };
        optContainer.appendChild(btn);
      });
    }

    // 指定ステージの画面を表示状態にする
    function showStage(stageNum) {
      currentStageNum = stageNum;
      
      // 全ステージ要素を隠す
      document.querySelectorAll('.stage-container').forEach(el => el.classList.add('hidden'));

      // ヘッダー情報と進行状況バーの更新
      updateProgress(stageNum);

      if (stageNum === 1) {
        // ① オープニング
        document.getElementById('stage-section-1').classList.remove('hidden');
        playVideoSafe('video-1');

      } else if (stageNum >= 2 && stageNum <= 5) {
        // ②〜⑤ 質問ステージ (共通コンポーネント)
        const qSection = document.getElementById('stage-section-question');
        qSection.classList.remove('hidden');

        // 表示する質問内容のキーマッピング
        let qKey = 'mori';
        if (stageNum === 3) qKey = 'bridge';
        if (stageNum === 4) qKey = 'cave';
        if (stageNum === 5) qKey = 'maze';

        // 各質問ステージ開始時に、質問進行インデックスを0（1問目）にリセット
        currentQuestionIdx = 0;

        // ビデオ要素のソース書き換えとリロード
        const qVideo = document.getElementById('question-video');
        qVideo.src = APP_CONFIG.videos[qKey];
        qVideo.load();
        
        // 各種状態初期化 (動画再生中表示・全画面背景演出)
        document.getElementById('interaction-area').classList.add('hidden');
        qVideo.classList.remove('opacity-40');

        // スキップボタンの引数を設定
        document.getElementById('btn-skip-question-video').onclick = function() {
          skipVideo('question');
        };

        // 1問目のデータを流し込み
        renderQuestionStep(qKey);

        // ビデオ再生開始
        playVideoSafe('question-video');

      } else if (stageNum === 6) {
        // ⑥ 魅力の宝箱
        document.getElementById('stage-section-6').classList.remove('hidden');
        document.getElementById('next-action-6').classList.add('hidden');
        document.getElementById('video-6').classList.remove('opacity-40');
        playVideoSafe('video-6');

      } else if (stageNum === 7) {
        // ⑦ 魅力の秘宝
        document.getElementById('stage-section-7').classList.remove('hidden');
        document.getElementById('next-action-7').classList.add('hidden');
        document.getElementById('video-7').classList.remove('opacity-40');
        playVideoSafe('video-7');

      } else if (stageNum === 8) {
        // ⑧ 映像書庫
        document.getElementById('stage-section-8').classList.remove('hidden');

      } else if (stageNum === 9) {
        // ⑨ 最後の選択
        document.getElementById('stage-section-9').classList.remove('hidden');
      }
    }

    // 次のステージに進むシンプルコントローラー
    function nextStage() {
      if (currentStageNum < 9) {
        showStage(currentStageNum + 1);
      }
    }

    // 質問動画が終了・スキップした際に選択肢フォームを表示
    function showQuestionInteraction() {
      const qVideo = document.getElementById('question-video');
      
      // 動画の視認性を少し落とし、質問を強調
      qVideo.classList.add('opacity-40');

      // 質問エリアを表示
      document.getElementById('interaction-area').classList.remove('hidden');
    }

    // ブラウザの仕様（自動再生制限など）への対策を施した動画再生メソッド
    function playVideoSafe(videoId) {
      const vid = document.getElementById(videoId);
      if (vid) {
        vid.muted = false; // 音を出したい場合はユーザーがアクションを起こす必要があるため
        const playPromise = vid.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            // 自動再生が制限された場合は自動的にミュートにして再試行
            console.log("Auto-play prevented. Retrying muted...");
            vid.muted = true;
            vid.play();
          });
        }
      }
    }

    // 進行状況バーとステージ名のビジュアル同期
    function updateProgress(stageNum) {
      const progressPercent = (stageNum / 9) * 100;
      document.getElementById('progress-bar').style.width = `${progressPercent}%`;
      document.getElementById('stage-badge').textContent = `ステージ ${stageNum}/9`;
      
      const stageNames = [
        "オープニング",
        "自己紹介の森",
        "信頼の吊り橋",
        "弱みの洞窟",
        "紹介の迷宮",
        "魅力の宝箱",
        "魅力の秘宝",
        "映像書庫",
        "最後の選択"
      ];
      document.getElementById('stage-name').textContent = stageNames[stageNum - 1];
    }

    // 最初からやり直す処理
    function restartAdventure() {
      // ユーザーの過去の回答履歴を初期化
      for (let key in userAnswers) {
        userAnswers[key] = [null, null, null];
      }
      currentQuestionIdx = 0;
      // ステージ1から再起動
      showStage(1);
    }
  </script>
</body>
</html>
